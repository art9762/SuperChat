name: Build Server Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Формируем название образа в стиле: ghcr.io/имя_владельца/имя_репозитория
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      # Необходимо для аутентификации в GHCR (GitHub Packages)
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Настройка QEMU для сборки под различные архитектуры (включая ARM64 для Apple Silicon)
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to the Container registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        # Встроенный токен авторизации GitHub
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Convert image name to lowercase
      run: |
        echo "IMAGE_NAME_LOWERCASE=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./server
        file: ./server/Dockerfile
        # Сборка сразу под x86 (для обычных серверов) и ARM64 (для Raspberry Pi и Apple Silicon)
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWERCASE }}:latest
