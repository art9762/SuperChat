name: Build Server Docker Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'server/**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Настройка QEMU для сборки под различные архитектуры (включая ARM64 для Apple Silicon)
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        # Для публикации образа нужно добавить DOCKERHUB_USERNAME и DOCKERHUB_TOKEN 
        # в секреты репозитория GitHub (Settings -> Secrets -> Actions)
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./server
        file: ./server/Dockerfile
        # Сборка сразу под x86 (для обычных серверов) и ARM64 (для Raspberry Pi и Apple Silicon)
        platforms: linux/amd64,linux/arm64
        # Используем логин, переданный через секрет, для формирования тега
        # Push только если это коммит в main ветку.
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/messenger-server:latest
